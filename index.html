<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booster spécial</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
      /* make carousel horizontally scrollable for swipe */
      .carousel {
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }
      .carousel-item {
        scroll-snap-align: center;
        scroll-snap-stop: always;
        flex: 0 0 100%;
      }

      /* Fading animation for booster opening */
      @keyframes fadeOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.92); }
      }
      .booster-open {
        animation: fadeOut 0.5s ease-out forwards;
      }

      @keyframes popIn {
        0% { transform: scale(0.9); opacity: 0.6; }
        60% { transform: scale(1.04); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .carousel-reveal {
        animation: popIn 0.5s ease-out both;
      }

      @keyframes cardBounce {
        0% { transform: translateY(8px) scale(0.97); }
        50% { transform: translateY(-6px) scale(1.01); }
        100% { transform: translateY(0) scale(1); }
      }
      .carousel-item:first-child img {
        animation: cardBounce 0.6s ease-out 0.2s both;
      }

      @keyframes celebrationPop {
        0% { transform: scale(0.9); opacity: 0.35; }
        60% { transform: scale(1.06); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      @keyframes confettiFall {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translate3d(var(--drift), 120vh, 0) rotate(720deg) scale(1);
          opacity: 0;
        }
      }

      @keyframes gentlePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }

      .open-text-pulse {
        animation: gentlePulse 1.2s ease-in-out infinite;
      }


      #confetti-canvas {
        position: fixed;
        inset: 0;
        z-index: 70;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
      }

      .celebration-active {
        opacity: 1;
        visibility: visible;
      }

      .celebration-piece {
        position: absolute;
        top: -20px;
        width: 10px;
        height: 16px;
        border-radius: 2px;
        box-shadow: 0 0 6px rgba(255,255,255,0.35);
        animation: confettiFall 1.2s cubic-bezier(.2,.8,.2,1) forwards;
        will-change: transform, opacity;
        z-index: 60;
      }

      .celebration-pop {
        animation: celebrationPop 0.45s ease-out both;
      }

    </style>
</head>
<body class="text-white min-h-screen w-full flex items-center justify-center bg-slate-950 p-3 sm:p-4">
  <canvas id="confetti-canvas" class="hidden"></canvas>
  <div id="celebration" class="pointer-events-none fixed inset-0 z-[60] overflow-hidden opacity-0 invisible">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(244,114,182,0.45),_transparent_45%),linear-gradient(135deg,_rgba(248,113,113,0.28),_rgba(250,204,21,0.2),_rgba(56,189,248,0.22))]"></div>
  </div>

  <div class="w-64">
    <h1 id="open_text" class="open-text-pulse text-2xl font-bold mb-4 text-center">Clique pour ouvrir ❤️</h1>
    <h1 id ="happy_bday" class="hidden text-2xl font-bold mb-4 text-center">Une carte spéciale pour une personne spéciale 🎉</h1>
    <button id="booster" type="button" class="w-full rounded-box overflow-hidden shadow-2xl">
      <img
        src="assets/booster.png"
        class="w-full"
        alt="Booster opening" />
    </button>

    <div id="carousel-wrapper" class="hidden w-full">
      <div id="carousel" class="carousel rounded-box w-full flex">
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_1.png"
            alt="Card 1" />
        </div>
        <div class="carousel-item w-full ">
          <img
            src="assets/pachirisu_2.png"
            alt="Card 2" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_3.png"
            alt="Card 3" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_4.png"
            alt="Card 4" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_5.png"
            alt="Card 5" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_6.png"
            alt="Card 6" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_7.png"
            alt="Card 7" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_8.png"
            alt="Card 8" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_9.png"
            alt="Card 9" />
        </div>
        <div class="carousel-item w-full">
          <img
            src="assets/pachirisu_10.JPG"
            alt="Card 8" />
        </div>
      </div>
    </div>
  </div>

  <script>
    // Booster opening + carousel swipe
    (function () {
      const booster = document.getElementById('booster');
      const carouselWrapper = document.getElementById('carousel-wrapper');
      const carousel = document.getElementById('carousel');
      const openText = document.getElementById('open_text');
      const birthdayText = document.getElementById('happy_bday');
      const celebrationLayer = document.getElementById('celebration');
      const confettiCanvas = document.getElementById('confetti-canvas');
      const confettiCtx = confettiCanvas ? confettiCanvas.getContext('2d') : null;

      if (!booster || !carouselWrapper || !carousel) return;

      let celebrationTriggered = false;
      let celebrationCheckTimeout = null;
      let confettiAnimationFrame = null;
      let confettiParticles = [];

      const scheduleCelebrationCheck = () => {
        if (celebrationCheckTimeout) {
          window.clearTimeout(celebrationCheckTimeout);
        }
        celebrationCheckTimeout = window.setTimeout(() => {
          checkLastCardVisibility();
        }, 80);
      };

      const resizeConfettiCanvas = () => {
        if (!confettiCanvas || !confettiCtx) return;
        const dpr = window.devicePixelRatio || 1;
        confettiCanvas.width = window.innerWidth * dpr;
        confettiCanvas.height = window.innerHeight * dpr;
        confettiCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };

      const launchConfetti = () => {
        if (!confettiCanvas || !confettiCtx) return;

        resizeConfettiCanvas();
        confettiCanvas.classList.remove('hidden');
        confettiParticles = [];

        const colors = ['#f472b6', '#facc15', '#38bdf8', '#fb7185', '#34d399', '#a78bfa'];
        for (let i = 0; i < 140; i += 1) {
          confettiParticles.push({
            x: Math.random() * window.innerWidth,
            y: -20 - Math.random() * 40,
            vx: (Math.random() - 0.5) * 4,
            vy: 2 + Math.random() * 3,
            size: 6 + Math.random() * 4,
            color: colors[i % colors.length],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.2,
            opacity: 1,
          });
        }

        const animateConfetti = () => {
          confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

          confettiParticles.forEach((piece) => {
            piece.x += piece.vx;
            piece.y += piece.vy;
            piece.vy += 0.03;
            piece.rotation += piece.rotationSpeed;
            piece.opacity -= 0.002;

            if (piece.opacity <= 0 || piece.y > window.innerHeight + 20) return;

            confettiCtx.save();
            confettiCtx.globalAlpha = piece.opacity;
            confettiCtx.translate(piece.x, piece.y);
            confettiCtx.rotate(piece.rotation);
            confettiCtx.fillStyle = piece.color;
            confettiCtx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.7);
            confettiCtx.restore();
          });

          confettiParticles = confettiParticles.filter((piece) => piece.opacity > 0 && piece.y <= window.innerHeight + 40);

          if (confettiParticles.length > 0) {
            confettiAnimationFrame = window.requestAnimationFrame(animateConfetti);
          } else {
            confettiAnimationFrame = null;
            confettiCanvas.classList.add('hidden');
            confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          }
        };

        if (confettiAnimationFrame) {
          window.cancelAnimationFrame(confettiAnimationFrame);
        }

        confettiAnimationFrame = window.requestAnimationFrame(animateConfetti);
      };

      const launchCelebration = () => {
        if (celebrationTriggered || !celebrationLayer) return;
        celebrationTriggered = true;

        celebrationLayer.classList.add('celebration-active');
        birthdayText.classList.remove('hidden');
        birthdayText.classList.add('celebration-pop');
        carouselWrapper.classList.add('celebration-pop');

        launchConfetti();

        window.setTimeout(() => {
          celebrationLayer.classList.remove('celebration-active');
        }, 1200);
      };

      const checkLastCardVisibility = () => {
        const lastCard = carousel.lastElementChild;
        if (!lastCard) return;

        const lastCardRect = lastCard.getBoundingClientRect();
        const carouselRect = carousel.getBoundingClientRect();
        const isAtCarouselEnd = carousel.scrollLeft + carousel.clientWidth >= carousel.scrollWidth - 4;
        const isLastCardVisible = lastCardRect.left >= carouselRect.left - 1 && lastCardRect.right <= carouselRect.right + 1;

        if (isAtCarouselEnd || isLastCardVisible) {
          launchCelebration();
        }
      };

      // If booster is clicked, hide it and the text and show the carousel after a short delay
      booster.addEventListener('click', () => {
        booster.classList.add('booster-open');
        openText.textContent = "";
        setTimeout(() => {
          booster.classList.add('hidden');
          carouselWrapper.classList.remove('hidden');
          carouselWrapper.classList.add('carousel-reveal');
          carousel.classList.add('carousel-reveal');

          window.requestAnimationFrame(() => {
            window.setTimeout(() => {
              checkLastCardVisibility();
            }, 250);
          });
        }, 450);
      });
      // Swipe functionality
      let startX = 0;
      let isDown = false;
      carousel.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDown = true;
      });

      carousel.addEventListener('touchmove', (e) => {
        if (!isDown) return;
        const x = e.touches[0].clientX;
        const dx = startX - x;
        carousel.scrollLeft += dx;
        startX = x;
      }, { passive: true });

      carousel.addEventListener('touchend', () => {
        isDown = false;
      });

      // if image 10 is fully visible, show the birthday text once and trigger the celebration
      carousel.addEventListener('scroll', () => {
        scheduleCelebrationCheck();
      });

      window.addEventListener('resize', () => {
        scheduleCelebrationCheck();
        resizeConfettiCanvas();
      });
    })();
  </script>
</body>
</html>
